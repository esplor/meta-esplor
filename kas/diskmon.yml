header:
  version: 17
local_conf_header:
  DISKMON: |
    BB_DISKMON_DIRS = "\
        STOPTASKS,${TMPDIR},1G,100K \
        STOPTASKS,${DL_DIR},1G,100K \
        STOPTASKS,${SSTATE_DIR},1G,100K \
        STOPTASKS,/tmp,100M,100K \
        HALT,${TMPDIR},100M,1K \
        HALT,${DL_DIR},100M,1K \
        HALT,${SSTATE_DIR},100M,1K \
        HALT,/tmp,10M,1K"

  # rm_work: delete recipe work dirs after build completes
  # saves disk, reduces cache pressure on low-RAM systems
  # sstate-cached recipes skip build entirely, so rm_work is a no-op for those
  # exclude recipes you need to inspect/rebuild incrementally
  # RM_WORK: |
  #   INHERIT += "rm_work"
  #   RM_WORK_EXCLUDE += ""
