[websettings]
# Disable features not needed for kiosk dashboard
enable-media=false
enable-webaudio=false
enable-webgl=false
enable-webrtc=false
enable-mediasource=false
enable-media-stream=false
enable-smooth-scrolling=false
enable-page-cache=false
enable-dns-prefetching=false
enable-offline-web-application-cache=false
enable-html5-database=false

# Security: kiosk doesn't need these
javascript-can-open-windows-automatically=false
javascript-can-access-clipboard=false
allow-modal-dialogs=false

# Debug: write console.log to stdout (useful for remote debugging)
enable-write-console-messages-to-stdout=true
