# Enable full SysRq so the watchdog can use 'b' to force reboot.
kernel.sysrq = 1

# Panic (and reboot, given panic=... on cmdline or the default) when a
# task is stuck in D-state longer than this. Belt-and-braces in case
# journald itself is wedged when the GPU cascade starts.
kernel.hung_task_timeout_secs = 90
kernel.hung_task_panic = 1
